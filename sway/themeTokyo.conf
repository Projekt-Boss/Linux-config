# Tokyo Night Storm – SwayFX Theme

### Window borders
default_border pixel 2
default_floating_border pixel 2

# Focused window
client.focused          #7aa2f7 #24283b #a9b1d6 #7aa2f7 #7aa2f7
client.focused_inactive #3b4261 #24283b #565f89 #3b4261 #3b4261
client.unfocused        #2f334d #24283b #565f89 #2f334d #2f334d
client.urgent           #f7768e #24283b #ffffff #f7768e #f7768e

### Gaps (clean look)
gaps inner 8 
gaps outer 5 

### Rounded corners (SwayFX feature)
corner_radius 10

### Shadows (subtle depth)
shadows enable
shadows_on_csd enable
shadow_blur_radius 20
shadow_color #000000aa

### Blur (SwayFX)
blur enable
blur_radius 4 
blur_passes 2
blur_noise 0.02

### Transparency (subtle)
#opacity_inactive 0.90

### Animations (smooth but not flashy)
animations enable
#animation_duration 0.2
#animation_fade_in 1
#animation_fade_out 1
#animation_window_open slide
#animation_window_close slide

### Layer effects (waybar/wofi blur)
layer_effects "waybar" blur enable
layer_effects "wofi" blur enable

### Smart gaps (nice behavior)
smart_gaps on
smart_borders on

### Floating windows
for_window [floating] border pixel 2

### Titlebar (minimal look)
titlebar_border_thickness 0
